name: Daily Portfolio Enhancement

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enhance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure git with your identity
        run: |
          git config user.name "CaptainPatel"
          git config user.email "k2patel4947@gmail.com"

      - name: Make a change
        run: |
          echo "Build run: $(date)" >> build-log.txt

      - name: Commit and push
        run: |
          git add build-log.txt
          git commit -m "chore: daily build log $(date +%Y-%m-%d)"
          git push origin main